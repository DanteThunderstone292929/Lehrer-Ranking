<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<style>

    --ink:#1F2A24;
    --muted:#5B655C;
    --accent:#3D6B4F;

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{

    background:var(--bg);

      radial-gradient(circle at 1px 1px, rgba(31,42,36,0.06) 1px, transparent 0);

    font-family:'Source Sans 3', sans-serif;

  .brand h1{

    font-weight:600;

    margin:0 0 2px;

<body>
<div class="wrap">

  <header class="top">

        </span>

    </div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// ==========================================================================
// SPEICHER-EINRICHTUNG — HIER DEINE FIREBASE-DATEN EINTRAGEN
// Anleitung: siehe Nachricht des Erstellers / Kommentare unten im Code.
// ==========================================================================
const FIREBASE_CONFIG = {
  apiKey: "DEIN_API_KEY",
  authDomain: "DEIN_PROJEKT.firebaseapp.com",
  projectId: "DEIN_PROJEKT",
  storageBucket: "DEIN_PROJEKT.appspot.com",
  messagingSenderId: "DEINE_SENDER_ID",
  appId: "DEINE_APP_ID"
};

let db = null;
let firebaseReady = false;
try{
  if(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "DEIN_API_KEY"){
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    firebaseReady = true;
  }
}catch(e){
  console.error('Firebase-Initialisierung fehlgeschlagen:', e);
  firebaseReady = false;
}

// Ersetzt die frühere window.storage-API (funktionierte nur in der Claude-
// Vorschau) durch eine eigene, gleich aufgebaute Version:
// - "shared" (geteilte) Daten -> Firestore, sichtbar für alle Besucher:innen
// - persönliche Daten (z.B. "schon abgestimmt") -> localStorage, nur dieses Gerät
const S = {
  async get(key, shared){
    if(shared){
      if(!db) throw new Error('Speicher nicht konfiguriert');
      const doc = await db.collection('kv').doc(key).get();
      if(!doc.exists) return null;
      return { key, value: doc.data().value, shared: true };
    } else {
      const v = localStorage.getItem(key);
      if(v === null) return null;
      return { key, value: v, shared: false };
    }
  },
  async set(key, value, shared){
    if(shared){
      if(!db) throw new Error('Speicher nicht konfiguriert');
      await db.collection('kv').doc(key).set({ value });
      return { key, value, shared: true };
    } else {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    }
  },
  async delete(key, shared){
    if(shared){
      if(!db) throw new Error('Speicher nicht konfiguriert');
      await db.collection('kv').doc(key).delete();
    } else {
      localStorage.removeItem(key);
    }
    return { key, deleted: true, shared: !!shared };
  }
};
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');
const modeToggle = document.getElementById('modeToggle');

// Feste Zugangsdaten. Hier direkt im Code ändern, falls nötig.
const ADMIN_PASSWORD = 'Ahorn-72-Fluss';
const VISITOR_PASSWORD = 'visitors';

let mode = 'student'; // 'student' | 'admin'
let adminUnlocked = false;
let accessRole = null; // 'admin' | 'visitor' | null
let adminScreen = 'dashboard'; // 'dashboard' | 'editSurvey' | 'results' | 'stats'
let studentScreen = 'list'; // 'list' | 'survey'
let activeSurveyId = null;

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=> toastEl.classList.remove('show'), 2200);
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function uid(){
  return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
}

function showConfirmModal(message, confirmLabel){
  return new Promise(resolve=>{
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-card">
        <p class="modal-msg"></p>
        <div class="modal-actions">
          <button class="btn btn-ghost btn-small" data-mres="0">Abbrechen</button>
          <button class="btn btn-danger btn-small" data-mres="1">${escapeHtml(confirmLabel || 'Löschen')}</button>
        </div>
      </div>
    `;
    overlay.querySelector('.modal-msg').textContent = message;
    document.body.appendChild(overlay);

    function cleanup(result){
      overlay.remove();
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onKey(e){
      if(e.key === 'Escape') cleanup(false);
      if(e.key === 'Enter') cleanup(true);
    }
    overlay.addEventListener('click', e=>{
      if(e.target === overlay){ cleanup(false); return; }
      const btn = e.target.closest('button[data-mres]');
      if(btn){ cleanup(btn.dataset.mres === '1'); }
    });
    document.addEventListener('keydown', onKey);
  });
}

function showPromptModal(message, placeholder){
  return new Promise(resolve=>{
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-card">
        <p class="modal-msg"></p>
        <input type="password" class="modal-input" placeholder="${escapeHtml(placeholder || '')}">
        <div class="modal-actions">
          <button class="btn btn-ghost btn-small" data-mres="cancel">Abbrechen</button>
          <button class="btn btn-primary btn-small" data-mres="ok">Bestätigen</button>
        </div>
      </div>
    `;
    overlay.querySelector('.modal-msg').textContent = message;
    document.body.appendChild(overlay);
    const input = overlay.querySelector('.modal-input');
    input.focus();

    function cleanup(result){
      overlay.remove();
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function submit(){
      cleanup(input.value);
    }
    function onKey(e){
      if(e.key === 'Escape') cleanup(null);
      if(e.key === 'Enter'){ e.preventDefault(); submit(); }
    }
    overlay.addEventListener('click', e=>{
      if(e.target === overlay){ cleanup(null); return; }
      const btn = e.target.closest('button[data-mres]');
      if(btn){ btn.dataset.mres === 'ok' ? submit() : cleanup(null); }
    });
    document.addEventListener('keydown', onKey);
  });
}

function normalizeAnswer(text){
  return text.trim().toLowerCase().replace(/\s+/g, ' ');
}

function aggregateAnswers(answers){
  // answers: [{text, ts}] -> grouped by normalized text, keeps original casing of first occurrence
  const map = new Map();
  answers.forEach(a=>{
    const key = normalizeAnswer(a.text);
    if(!key) return;
    if(!map.has(key)) map.set(key, { display: a.text.trim(), count: 0 });
    map.get(key).count++;
  });
  return Array.from(map.values()).sort((a,b)=> b.count - a.count);
}

// Normalisiert für den Vergleich: Kleinbuchstaben, Umlaute/ß aufgelöst,
// Leerzeichen/Bindestriche/Apostrophe entfernt.
function normKey(s){
  return s.toLowerCase()
    .replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss')
    .replace(/[\s\-''’]/g, '');
}

// Klassische Levenshtein-Distanz (Tippfehler-Toleranz)
function levenshtein(a, b){
  const m = a.length, n = b.length;
  if(m === 0) return n;
  if(n === 0) return m;
  const dp = new Array(n + 1);
  for(let j = 0; j <= n; j++) dp[j] = j;
  for(let i = 1; i <= m; i++){
    let prev = dp[0];
    dp[0] = i;
    for(let j = 1; j <= n; j++){
      const tmp = dp[j];
      dp[j] = Math.min(
        dp[j] + 1,
        dp[j-1] + 1,
        prev + (a[i-1] === b[j-1] ? 0 : 1)
      );
      prev = tmp;
    }
  }
  return dp[n];
}

// Score: kleiner = besser passend.
// 0 exakt · 1 Präfix (sehr ähnlich) · 2.x kleiner Tippfehler · 3 Teilstring · 4.x größerer Tippfehler
function matchScore(query, candidateKey){
  if(!query) return null;
  if(candidateKey === query) return 0;
  if(candidateKey.startsWith(query)) return 1;
  const d = levenshtein(query, candidateKey);
  if(d <= 2) return 2 + d / 10;
  if(candidateKey.includes(query)) return 3;
  const maxAllowed = Math.max(2, Math.ceil(candidateKey.length * 0.4));
  if(d <= maxAllowed) return 4 + d / 10;
  return null;
}

function searchTeachers(rawQuery, genderFilter){
  const query = normKey(rawQuery);
  if(query.length < 2) return [];

  const scored = [];
  TEACHERS.forEach(t=>{
    if(genderFilter && t.g !== genderFilter) return;
    const score = matchScore(query, normKey(t.n));
    if(score !== null) scored.push({ t, score });
  });
  scored.sort((a, b)=> a.score - b.score || a.t.n.localeCompare(b.t.n));

  const top = scored.slice(0, 12).map(s=>s.t);

  // Gruppieren nach Geschlecht+Nachname, um bei echten Duplikaten
  // (z.B. drei Herr Fischer) den Vornamen-Anfangsbuchstaben zu ergänzen.
  const groupCounts = {};
  top.forEach(t=>{
    const key = t.g + '|' + normKey(t.n);
    groupCounts[key] = (groupCounts[key] || 0) + 1;
  });

  const seen = new Set();
  const results = [];
  top.forEach(t=>{
    const key = t.g + '|' + normKey(t.n) + '|' + (t.f || '');
    if(seen.has(key)) return;
    seen.add(key);
    const groupKey = t.g + '|' + normKey(t.n);
    const needsInitial = groupCounts[groupKey] > 1 && t.f;
    const sal = t.g === 'M' ? 'Herr' : 'Frau';
    const label = needsInitial ? `${sal} ${t.f.charAt(0)}. ${t.n}` : `${sal} ${t.n}`;
    results.push({ label });
  });

  return results.slice(0, 7);
}

// Erkennt das aktuell getippte Wort am Cursor, plus optional vorangestelltes
// "Herr"/"Frau" (dient nur zur Geschlechts-Eingrenzung, wird beim Einsetzen
// zusammen mit dem Namen ersetzt).
function getAcTrigger(text, cursorPos){
  const upTo = text.slice(0, cursorPos);
  const m = upTo.match(/(?:(Herr|Frau)\s+)?([A-Za-zÀ-ÿ''’\-]{2,30})$/i);
  if(!m) return null;
  const start = cursorPos - m[0].length;
  return { salutation: m[1] || null, partial: m[2], start };
}

function attachTeacherAutocomplete(textareaEl){
  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';
  textareaEl.parentNode.insertBefore(wrap, textareaEl);
  wrap.appendChild(textareaEl);
  const list = document.createElement('div');
  list.className = 'ac-list';
  wrap.appendChild(list);

  let activeIndex = -1;
  let currentMatches = [];
  let currentTrigger = null;

  function closeList(){
    list.classList.remove('show');
    list.innerHTML = '';
    activeIndex = -1;
    currentMatches = [];
  }

  function renderList(){
    list.innerHTML = '';
    currentMatches.forEach((m, i)=>{
      const item = document.createElement('div');
      item.className = 'ac-item' + (i === activeIndex ? ' active' : '');
      item.textContent = m.label;
      item.addEventListener('mousedown', (e)=>{
        e.preventDefault();
        selectMatch(m);
      });
      list.appendChild(item);
    });
    list.classList.toggle('show', currentMatches.length > 0);
  }

  function selectMatch(m){
    const val = textareaEl.value;
    const before = val.slice(0, currentTrigger.start);
    const after = val.slice(textareaEl.selectionStart);
    const newVal = before + m.label + after;
    textareaEl.value = newVal;
    const newPos = before.length + m.label.length;
    textareaEl.focus();
    textareaEl.setSelectionRange(newPos, newPos);
    closeList();
  }

  textareaEl.addEventListener('input', ()=>{
    const trig = getAcTrigger(textareaEl.value, textareaEl.selectionStart);
    if(!trig){ closeList(); return; }
    const genderFilter = trig.salutation
      ? (trig.salutation.toLowerCase() === 'herr' ? 'M' : 'F')
      : null;
    currentMatches = searchTeachers(trig.partial, genderFilter);
    currentTrigger = trig;
    activeIndex = currentMatches.length ? 0 : -1;
    renderList();
  });

  textareaEl.addEventListener('keydown', (e)=>{
    if(!list.classList.contains('show')) return;
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, currentMatches.length - 1);
      renderList();
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      renderList();
    } else if(e.key === 'Enter' || e.key === 'Tab'){
      if(activeIndex >= 0 && currentMatches[activeIndex]){
        e.preventDefault();
        selectMatch(currentMatches[activeIndex]);
      }
    } else if(e.key === 'Escape'){
      closeList();
    }
  });

  textareaEl.addEventListener('blur', ()=>{
    setTimeout(closeList, 120);
  });
}

// Eigenständiges Auswahlfeld: Fuzzy-Suche ohne "Herr"/"Frau"-Trigger nötig.
// Klick auf einen Vorschlag fügt den Namen am Ende des Ziel-Textfelds ein.
function attachTeacherPickerField(inputEl, targetTextareaEl){
  const wrap = document.createElement('div');
  wrap.className = 'ac-wrap';
  inputEl.parentNode.insertBefore(wrap, inputEl);
  wrap.appendChild(inputEl);
  const list = document.createElement('div');
  list.className = 'ac-list';
  wrap.appendChild(list);

  let activeIndex = -1;
  let currentMatches = [];

  function closeList(){
    list.classList.remove('show');
    list.innerHTML = '';
    activeIndex = -1;
    currentMatches = [];
  }

  function renderList(){
    list.innerHTML = '';
    currentMatches.forEach((m, i)=>{
      const item = document.createElement('div');
      item.className = 'ac-item' + (i === activeIndex ? ' active' : '');
      item.textContent = m.label;
      item.addEventListener('mousedown', (e)=>{
        e.preventDefault();
        selectMatch(m);
      });
      list.appendChild(item);
    });
    list.classList.toggle('show', currentMatches.length > 0);
  }

  function selectMatch(m){
    const current = targetTextareaEl.value;
    const needsSpace = current.length > 0 && !/\s$/.test(current);
    targetTextareaEl.value = current + (needsSpace ? ' ' : '') + m.label;
    inputEl.value = '';
    closeList();
    targetTextareaEl.focus();
    const pos = targetTextareaEl.value.length;
    targetTextareaEl.setSelectionRange(pos, pos);
  }

  inputEl.addEventListener('input', ()=>{
    const q = inputEl.value.trim();
    if(q.length < 2){ closeList(); return; }
    currentMatches = searchTeachers(q, null);
    activeIndex = currentMatches.length ? 0 : -1;
    renderList();
  });

  inputEl.addEventListener('keydown', (e)=>{
    if(!list.classList.contains('show')) return;
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, currentMatches.length - 1);
      renderList();
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      renderList();
    } else if(e.key === 'Enter'){
      if(activeIndex >= 0 && currentMatches[activeIndex]){
        e.preventDefault();
        selectMatch(currentMatches[activeIndex]);
      }
    } else if(e.key === 'Escape'){
      closeList();
    }
  });

  inputEl.addEventListener('blur', ()=>{
    setTimeout(closeList, 120);
  });
}

      </div>
    </div>
  `;

    studentScreen='list'; activeSurveyId=null; render();
  });

  const qList = document.getElementById('qList');
  survey.questions.forEach(q=>{
    const div = document.createElement('div');
    div.className = 'question-card';
    div.innerHTML = `
      <p class="qtext">${escapeHtml(q.text)}</p>
      <textarea placeholder="Deine Antwort …" data-qid="${q.id}"></textarea>
    `;
    qList.appendChild(div);
    attachTeacherAutocomplete(div.querySelector('textarea'));
  });

  document.getElementById('submitBtn').addEventListener('click', async ()=>{
    const btn = document.getElementById('submitBtn');
    const areas = qList.querySelectorAll('textarea');

    let firstEmpty = null;
    areas.forEach(a=>{
      a.classList.remove('field-error');
      if(!a.value.trim()){
        a.classList.add('field-error');
        if(!firstEmpty) firstEmpty = a;
      }
    });
    if(firstEmpty){
      showToast('Bitte beantworte alle Fragen.');
      firstEmpty.focus();
      firstEmpty.scrollIntoView({ behavior:'smooth', block:'center' });
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Wird gesendet …';
    const answers = {};
    areas.forEach(a=>{ answers[a.dataset.qid] = a.value.trim(); });

    try{
      if(!isAdmin){

        if(stillVoted){
          showToast('Du hast bereits abgestimmt.');
          studentScreen = 'survey';
          renderStudentSurvey();
          return;
        }
      }
      const all = await getAllResponses();
      if(!all[survey.id]) all[survey.id] = [];
      all[survey.id].push({ id: uid(), ts: Date.now(), answers });
      await setAllResponses(all);
      if(!isAdmin) await markVoted(survey.id);
      renderThanks();

      showToast('Senden fehlgeschlagen. Bitte nochmal versuchen.');
      btn.disabled = false;
      btn.textContent = 'Antworten absenden';
    }
  });
}

    listEl.appendChild(item);
  });

  listEl.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      if(act === 'edit' && isAdminRole){ activeSurveyId = id; adminScreen = 'editSurvey'; renderAdminRouter(); }
      else if(act === 'results'){ activeSurveyId = id; adminScreen = 'results'; renderAdminRouter(); }
      else if(act === 'stats'){ activeSurveyId = id; adminScreen = 'stats'; renderAdminRouter(); }
      else if(act === 'delete' && isAdminRole){
        const ok = await showConfirmModal('Diese Umfrage inkl. aller Fragen und Antworten unwiderruflich löschen?');
        if(!ok) return;
        const qs = (await getSurveys()).filter(s=>s.id !== id);
        await setSurveys(qs);
        const resp = await getAllResponses();
        delete resp[id];
        await setAllResponses(resp);
        renderDashboard();
      }
    });
  });

  const createBtn = document.getElementById('createBtn');
  if(createBtn) createBtn.addEventListener('click', async ()=>{
    const title = document.getElementById('newTitle').value.trim();
    const desc = document.getElementById('newDesc').value.trim();
    if(!title){ showToast('Bitte einen Titel eingeben.'); return; }
    const list = await getSurveys();
    const newSurvey = { id: uid(), title, description: desc, questions: [], createdAt: Date.now() };
    list.push(newSurvey);
    await setSurveys(list);
    showToast('Umfrage angelegt.');
    activeSurveyId = newSurvey.id;
    adminScreen = 'editSurvey';
    renderAdminRouter();
  });

  const wipeBtn = document.getElementById('wipeBtn');
  if(wipeBtn) wipeBtn.addEventListener('click', async ()=>{
    const ok = await showConfirmModal('Wirklich ALLE Umfragen und Antworten unwiderruflich löschen?');
    if(!ok) return;
    await setSurveys([]);
    await setAllResponses({});
    showToast('Alle Daten gelöscht.');
    renderDashboard();
  });
}

// ---- Edit survey: title/description + questions ----
async function renderEditSurvey(){
  app.innerHTML = '<div class="card"><p class="hint">Lade …</p></div>';
  const surveys = await getSurveys();
  const survey = surveys.find(s=>s.id === activeSurveyId);
  if(!survey){ adminScreen='dashboard'; return renderAdminRouter(); }
  const allResp = await getAllResponses();
  const responses = allResp[survey.id] || [];

  app.innerHTML = `
    <div class="card">
      <span class="breadcrumb" id="backBtn">← Zurück zur Übersicht</span>
      <p class="eyebrow" style="margin-top:12px;">Umfrage bearbeiten</p>
      <label class="field-label" for="editTitle">Titel</label>
      <input type="text" id="editTitle" value="${escapeHtml(survey.title)}">
      <label class="field-label" style="margin-top:12px;" for="editDesc">Beschreibung (optional)</label>
      <textarea id="editDesc" style="min-height:60px;">${escapeHtml(survey.description || '')}</textarea>
      <div class="submit-row">
        <button class="btn btn-primary btn-small" id="saveMetaBtn">Änderungen speichern</button>
      </div>
    </div>

    <div class="card">
      <p class="eyebrow">Frage hinzufügen</p>
      <textarea id="newQ" style="min-height:64px;" placeholder="z.B. Was schätzt du an eurem Klassenlehrer / eurer Klassenlehrerin?"></textarea>
      <label class="field-label" style="margin-top:14px;" for="teacherPicker">Lehrer auswählen &amp; einfügen (optional)</label>
      <input type="text" id="teacherPicker" placeholder="Nachname tippen, z.B. Müller, Fischer, Höfler …">
      <div class="submit-row">
        <button class="btn btn-primary" id="addQBtn">Frage hinzufügen</button>
      </div>
    </div>

    <div class="card">
      <p class="eyebrow">Fragen in dieser Umfrage</p>
      <div id="qManageList"></div>
      ${survey.questions.length === 0 ? '<p class="hint">Noch keine Fragen angelegt.</p>' : ''}
    </div>
  `;

  document.getElementById('backBtn').addEventListener('click', ()=>{
    adminScreen='dashboard'; activeSurveyId=null; renderAdminRouter();
  });

  attachTeacherAutocomplete(document.getElementById('newQ'));
  attachTeacherPickerField(document.getElementById('teacherPicker'), document.getElementById('newQ'));

  document.getElementById('saveMetaBtn').addEventListener('click', async ()=>{
    const title = document.getElementById('editTitle').value.trim();
    const desc = document.getElementById('editDesc').value.trim();
    if(!title){ showToast('Titel darf nicht leer sein.'); return; }
    const list = await getSurveys();
    const idx = list.findIndex(s=>s.id === survey.id);
    list[idx].title = title;
    list[idx].description = desc;
    await setSurveys(list);
    showToast('Gespeichert.');
  });

  document.getElementById('addQBtn').addEventListener('click', async ()=>{
    const val = document.getElementById('newQ').value.trim();
    if(!val){ showToast('Bitte eine Frage eingeben.'); return; }
    const list = await getSurveys();
    const idx = list.findIndex(s=>s.id === survey.id);
    list[idx].questions.push({ id: uid(), text: val });
    await setSurveys(list);
    showToast('Frage hinzugefügt.');
    renderEditSurvey();
  });

  const qManageList = document.getElementById('qManageList');
  survey.questions.forEach(q=>{
    const n = responses.filter(r => r.answers && r.answers[q.id]).length;
    const item = document.createElement('div');
    item.className = 'admin-q-item';
    item.innerHTML = `
      <span class="qtxt">${escapeHtml(q.text)}</span>
      <span class="count">${n} Antwort${n===1?'':'en'}</span>
      <button class="remove-x" title="Frage löschen" data-qid="${q.id}">✕</button>
    `;
    qManageList.appendChild(item);
  });
  qManageList.querySelectorAll('.remove-x').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ok = await showConfirmModal('Diese Frage inkl. aller Antworten dazu löschen?');
      if(!ok) return;
      const qid = btn.dataset.qid;
      const list = await getSurveys();
      const idx = list.findIndex(s=>s.id === survey.id);
      list[idx].questions = list[idx].questions.filter(q=>q.id !== qid);
      await setSurveys(list);
      const all = await getAllResponses();
      (all[survey.id] || []).forEach(r=>{ if(r.answers) delete r.answers[qid]; });
      await setAllResponses(all);
      renderEditSurvey();
    });
  });
}

// ---- Results: raw answers per question ----
async function renderResults(){
  app.innerHTML = '<div class="card"><p class="hint">Lade Antworten …</p></div>';
  const surveys = await getSurveys();
  const survey = surveys.find(s=>s.id === activeSurveyId);
  if(!survey){ adminScreen='dashboard'; return renderAdminRouter(); }
  const allResp = await getAllResponses();
  const responses = allResp[survey.id] || [];

  app.innerHTML = `
    <div class="card">
      <span class="breadcrumb" id="backBtn">← Zurück zur Übersicht</span>
      <p class="eyebrow" style="margin-top:12px;">${escapeHtml(survey.title)} — Antworten</p>
      <div id="resultsList"></div>
    </div>
  `;
  document.getElementById('backBtn').addEventListener('click', ()=>{
    adminScreen='dashboard'; activeSurveyId=null; renderAdminRouter();
  });

  const resultsList = document.getElementById('resultsList');
  if(!survey.questions.length){
    resultsList.innerHTML = '<p class="hint">Diese Umfrage hat noch keine Fragen.</p>';
    return;
  }
  survey.questions.forEach((q, i)=>{
    const answers = responses
      .filter(r => r.answers && r.answers[q.id])
      .map(r => ({ text: r.answers[q.id], ts: r.ts }))
      .reverse();

    const block = document.createElement('div');
    block.className = 'qgroup';

    if(!answers.length){
      block.innerHTML = `<p class="qtext" style="font-size:16px;">${escapeHtml(q.text)}</p><p class="hint">Noch keine Antworten.</p>`;
      resultsList.appendChild(block);
      return;
    }

    const tally = aggregateAnswers(answers);
    const maxCount = tally[0].count;
    const groupId = 'raw-' + q.id;

    const tallyHtml = tally.map(t=>{
      const pct = Math.round((t.count / maxCount) * 100);
      return `
        <div class="tally-row">
          <span class="tname">${escapeHtml(t.display)}</span>
          <div class="tally-bar-track"><div class="tally-bar-fill" style="width:${pct}%;"></div></div>
          <span class="tcount">${t.count}×</span>
        </div>`;
    }).join('');

    const rawHtml = answers.map(a=>`
      <div class="answer-item">${escapeHtml(a.text)}
        <span class="ts">${new Date(a.ts).toLocaleString('de-DE')}</span>
      </div>`).join('');

    block.innerHTML = `
      <p class="qtext" style="font-size:16px;">${escapeHtml(q.text)}</p>
      <div class="tally-list">${tallyHtml}</div>
      <button class="toggle-raw" data-group="${groupId}">Einzelantworten anzeigen (${answers.length})</button>
      <div class="raw-answers" id="${groupId}">${rawHtml}</div>
    `;
    resultsList.appendChild(block);
  });

  resultsList.querySelectorAll('.toggle-raw').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const target = document.getElementById(btn.dataset.group);
      const nowShown = target.classList.toggle('show');
      const count = target.querySelectorAll('.answer-item').length;
      btn.textContent = nowShown
        ? `Einzelantworten ausblenden`
        : `Einzelantworten anzeigen (${count})`;
    });
  });
}

// ---- Stats: aggregate numbers per survey ----
async function renderStats(){
  app.innerHTML = '<div class="card"><p class="hint">Lade Statistiken …</p></div>';
  const surveys = await getSurveys();
  const survey = surveys.find(s=>s.id === activeSurveyId);
  if(!survey){ adminScreen='dashboard'; return renderAdminRouter(); }
  const allResp = await getAllResponses();
  const responses = allResp[survey.id] || [];
  const total = responses.length;

  app.innerHTML = `
    <div class="card">
      <span class="breadcrumb" id="backBtn">← Zurück zur Übersicht</span>
      <p class="eyebrow" style="margin-top:12px;">${escapeHtml(survey.title)} — Statistiken</p>

      <div class="stat-block">
        <div class="stat-headline">
          <span class="num">${total}</span>
          <span class="label">Teilnahme${total===1?'':'n'} insgesamt</span>
        </div>
      </div>

      <div class="stat-block" id="perQBlock">
        <p class="eyebrow">Beantwortungsquote je Frage</p>
        <div id="perQList"></div>
      </div>

      <div class="stat-block" id="lastActivity"></div>
    </div>
  `;
  document.getElementById('backBtn').addEventListener('click', ()=>{
    adminScreen='dashboard'; activeSurveyId=null; renderAdminRouter();
  });

  const perQList = document.getElementById('perQList');
  if(!survey.questions.length){
    perQList.innerHTML = '<p class="hint">Diese Umfrage hat noch keine Fragen.</p>';
  } else if(total === 0){
    perQList.innerHTML = '<p class="hint">Noch keine Teilnahmen, daher keine Statistik verfügbar.</p>';
  } else {
    survey.questions.forEach(q=>{
      const n = responses.filter(r => r.answers && r.answers[q.id]).length;
      const pct = Math.round((n / total) * 100);
      const row = document.createElement('div');
      row.className = 'stat-q';
      row.innerHTML = `
        <span class="qname">${escapeHtml(q.text)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
        <span class="pct">${n}/${total} · ${pct}%</span>
      `;
      perQList.appendChild(row);
    });
  }

  const lastBlock = document.getElementById('lastActivity');
  if(total > 0){
    const last = responses.reduce((a,b)=> a.ts > b.ts ? a : b);
    lastBlock.innerHTML = `<p class="hint">Letzte Teilnahme: ${new Date(last.ts).toLocaleString('de-DE')}</p>`;
  }
}
